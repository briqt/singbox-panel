<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SingBox Panel</title>
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<style>
[x-cloak]{display:none!important}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#374151;border-radius:3px}
</style>
</head>
<body class="bg-gray-950 text-gray-300 min-h-screen antialiased">
<div x-data="app()" x-cloak>

<!-- Toasts -->
<div class="fixed bottom-4 right-4 z-[100] space-y-2">
  <template x-for="t in toasts" :key="t.id">
    <div :class="t.type==='error'?'border-red-500/50 bg-red-950/80':'border-emerald-500/50 bg-emerald-950/80'"
         class="px-4 py-2.5 rounded-lg text-sm border backdrop-blur flex items-center gap-2 shadow-xl"
         x-init="setTimeout(()=>toasts=toasts.filter(x=>x.id!==t.id),3000)">
      <span :class="t.type==='error'?'text-red-400':'text-emerald-400'" x-text="t.type==='error'?'✕':'✓'" class="text-xs font-bold"></span>
      <span x-text="t.msg" class="text-gray-200"></span>
    </div>
  </template>
</div>

<!-- Login -->
<template x-if="!authed">
<div class="flex items-center justify-center min-h-screen">
  <div class="bg-gray-900 border border-gray-800 p-8 rounded-2xl w-full max-w-xs shadow-2xl">
    <div class="text-center mb-6">
      <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center mx-auto mb-3 text-lg font-bold text-white">S</div>
      <h1 class="text-lg font-semibold text-white">SingBox Panel</h1>
      <p class="text-xs text-gray-500 mt-1">Admin access required</p>
    </div>
    <input x-model="tokenInput" type="password" placeholder="Token"
           class="w-full px-3 py-2.5 rounded-lg bg-gray-800 border border-gray-700 text-sm focus:outline-none focus:border-blue-500 transition placeholder-gray-600"
           @keydown.enter="login()">
    <button @click="login()" class="w-full mt-3 bg-blue-600 hover:bg-blue-500 text-white py-2.5 rounded-lg text-sm font-medium transition">Sign In</button>
  </div>
</div>
</template>

<!-- App -->
<template x-if="authed">
<div class="flex min-h-screen">
  <!-- Sidebar -->
  <aside class="w-48 bg-gray-900/50 border-r border-gray-800/50 flex flex-col fixed h-full">
    <div class="px-4 py-4 border-b border-gray-800/50">
      <span class="font-semibold text-white text-sm tracking-tight">SingBox Panel</span>
    </div>
    <nav class="flex-1 p-2 space-y-0.5">
      <template x-for="t in [{id:'dash',icon:'◐',label:'Overview'},{id:'users',icon:'●',label:'Users'},{id:'nodes',icon:'◆',label:'Nodes'},{id:'stats',icon:'◧',label:'Stats'}]">
        <button @click="tab=t.id;loadTab()" :class="tab===t.id?'bg-gray-800 text-white':'text-gray-400 hover:text-gray-200 hover:bg-gray-800/50'"
                class="w-full flex items-center gap-2.5 px-3 py-2 rounded-lg text-sm transition">
          <span x-text="t.icon" class="text-[10px] opacity-60"></span><span x-text="t.label"></span>
        </button>
      </template>
    </nav>
    <div class="p-3 border-t border-gray-800/50">
      <button @click="authed=false;localStorage.removeItem('admin_token')" class="text-xs text-gray-500 hover:text-gray-300 transition">Sign out</button>
    </div>
  </aside>

  <!-- Content -->
  <main class="ml-48 flex-1 p-6 max-w-5xl">

  <!-- Overview -->
  <div x-show="tab==='dash'">
    <h2 class="text-lg font-semibold text-white mb-4">Overview</h2>
    <div class="grid grid-cols-3 gap-4 mb-6">
      <div class="bg-gray-900 border border-gray-800 rounded-xl p-4">
        <div class="text-2xl font-bold text-white" x-text="users.length"></div>
        <div class="text-xs text-gray-500 mt-1">Users</div>
      </div>
      <div class="bg-gray-900 border border-gray-800 rounded-xl p-4">
        <div class="text-2xl font-bold text-white" x-text="nodes.length"></div>
        <div class="text-xs text-gray-500 mt-1">Nodes</div>
      </div>
      <div class="bg-gray-900 border border-gray-800 rounded-xl p-4">
        <div class="text-2xl font-bold text-white" x-text="fmtBytes(users.reduce((a,u)=>a+u.traffic_used_bytes,0))"></div>
        <div class="text-xs text-gray-500 mt-1">Total Traffic</div>
      </div>
    </div>
    <div class="grid grid-cols-2 gap-4">
      <div class="bg-gray-900 border border-gray-800 rounded-xl p-4">
        <h3 class="text-xs font-medium text-gray-400 uppercase tracking-wider mb-3">Users</h3>
        <template x-for="u in users" :key="u.id">
          <div class="flex items-center justify-between py-1.5 text-sm">
            <div class="flex items-center gap-2">
              <span :class="u.enabled?'bg-emerald-500':'bg-gray-600'" class="w-1.5 h-1.5 rounded-full"></span>
              <span x-text="u.name" class="text-gray-200"></span>
            </div>
            <span class="text-xs text-gray-500" x-text="fmtBytes(u.traffic_used_bytes)"></span>
          </div>
        </template>
      </div>
      <div class="bg-gray-900 border border-gray-800 rounded-xl p-4">
        <h3 class="text-xs font-medium text-gray-400 uppercase tracking-wider mb-3">Nodes</h3>
        <template x-for="n in nodes" :key="n.id">
          <div class="flex items-center justify-between py-1.5 text-sm">
            <div class="flex items-center gap-2">
              <span :class="n.enabled?'bg-emerald-500':'bg-gray-600'" class="w-1.5 h-1.5 rounded-full"></span>
              <span x-text="n.name" class="text-gray-200"></span>
            </div>
            <span class="text-xs text-gray-500 font-mono" x-text="n.host"></span>
          </div>
        </template>
      </div>
    </div>
  </div>

  <!-- Users Tab -->
  <div x-show="tab==='users'">
    <div class="flex items-center justify-between mb-4">
      <h2 class="text-lg font-semibold text-white">Users</h2>
      <button @click="showCreateUser=true" class="px-3 py-1.5 bg-blue-600 hover:bg-blue-500 text-white text-xs rounded-lg transition">+ New User</button>
    </div>
    <div class="bg-gray-900 border border-gray-800 rounded-xl overflow-hidden">
      <table class="w-full text-sm">
        <thead><tr class="border-b border-gray-800 text-xs text-gray-500 uppercase tracking-wider">
          <th class="px-4 py-3 text-left">User</th>
          <th class="px-4 py-3 text-left">Traffic</th>
          <th class="px-4 py-3 text-left">Expires</th>
          <th class="px-4 py-3 text-left">Sub</th>
          <th class="px-4 py-3 text-right">Actions</th>
        </tr></thead>
        <tbody>
        <template x-for="u in users" :key="u.id">
          <tr class="border-b border-gray-800/50 hover:bg-gray-800/30 transition">
            <td class="px-4 py-3">
              <div class="flex items-center gap-2">
                <span :class="u.enabled?'bg-emerald-500':'bg-red-500'" class="w-2 h-2 rounded-full flex-shrink-0"></span>
                <span x-text="u.name" class="text-gray-100 font-medium"></span>
              </div>
            </td>
            <td class="px-4 py-3">
              <div class="flex items-center gap-2">
                <div class="w-20 h-1.5 bg-gray-800 rounded-full overflow-hidden">
                  <div class="h-full rounded-full" :class="u.traffic_limit_bytes&&u.traffic_used_bytes/u.traffic_limit_bytes>0.8?'bg-red-500':'bg-blue-500'"
                       :style="'width:'+Math.min(100,u.traffic_limit_bytes?Math.round(u.traffic_used_bytes/u.traffic_limit_bytes*100):0)+'%'"></div>
                </div>
                <span class="text-xs text-gray-400" x-text="fmtBytes(u.traffic_used_bytes)+' / '+(u.traffic_limit_bytes?fmtBytes(u.traffic_limit_bytes):'∞')"></span>
              </div>
            </td>
            <td class="px-4 py-3 text-xs text-gray-400" x-text="u.expire_at||'—'"></td>
            <td class="px-4 py-3">
              <button @click="copySubLink(u)" class="text-xs text-blue-400 hover:text-blue-300 font-mono transition">copy link</button>
            </td>
            <td class="px-4 py-3">
              <div class="flex items-center justify-end gap-1">
                <button @click="toggleUser(u)" :class="u.enabled?'text-emerald-400 hover:text-emerald-300':'text-gray-500 hover:text-gray-300'" class="px-2 py-1 text-xs rounded transition" x-text="u.enabled?'on':'off'"></button>
                <button @click="showAccessModal(u)" class="px-2 py-1 text-xs text-gray-400 hover:text-white rounded transition">access</button>
                <button @click="resetTraffic(u)" class="px-2 py-1 text-xs text-gray-400 hover:text-white rounded transition">reset</button>
                <button @click="deleteUser(u)" class="px-2 py-1 text-xs text-red-400/60 hover:text-red-400 rounded transition">del</button>
              </div>
            </td>
          </tr>
        </template>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Nodes Tab -->
  <div x-show="tab==='nodes'">
    <div class="flex items-center justify-between mb-4">
      <h2 class="text-lg font-semibold text-white">Nodes</h2>
      <button @click="pushAll()" class="px-3 py-1.5 bg-orange-600 hover:bg-orange-500 text-white text-xs rounded-lg transition">Push All</button>
    </div>
    <div class="space-y-2">
      <template x-for="n in nodes" :key="n.id">
        <div class="bg-gray-900 border border-gray-800 rounded-xl overflow-hidden">
          <div class="flex items-center justify-between px-4 py-3 cursor-pointer hover:bg-gray-800/30 transition" @click="toggleNodeDetail(n)">
            <div class="flex items-center gap-3">
              <span :class="n.enabled?'bg-emerald-500':'bg-gray-600'" class="w-2 h-2 rounded-full"></span>
              <span x-text="n.name" class="text-gray-100 font-medium text-sm"></span>
              <span x-text="n.domain||n.host" class="text-xs text-gray-500 font-mono"></span>
            </div>
            <div class="flex items-center gap-2">
              <button @click.stop="pushNode(n)" class="px-2 py-1 text-xs bg-gray-800 hover:bg-gray-700 text-gray-300 rounded transition">push</button>
              <button @click.stop="generateNode(n)" class="px-2 py-1 text-xs bg-gray-800 hover:bg-gray-700 text-gray-300 rounded transition">preview</button>
              <span class="text-gray-600 text-xs" x-text="expandedNode===n.id?'▾':'▸'"></span>
            </div>
          </div>
          <div x-show="expandedNode===n.id" class="border-t border-gray-800/50 px-4 py-3 bg-gray-950/50">
            <div class="text-xs text-gray-500 mb-2">Inbounds</div>
            <template x-if="nodeDetail&&nodeDetail.id===n.id">
              <div class="space-y-1">
                <template x-for="ib in nodeDetail.inbounds||[]" :key="ib.id">
                  <div class="flex items-center gap-3 text-xs py-1">
                    <span class="text-gray-400 font-mono w-28" x-text="ib.protocol"></span>
                    <span class="text-gray-500">:</span>
                    <span class="text-gray-300 font-mono" x-text="ib.port"></span>
                    <span class="text-gray-600" x-text="ib.tag"></span>
                  </div>
                </template>
                <div x-show="!nodeDetail.inbounds||nodeDetail.inbounds.length===0" class="text-xs text-gray-600 italic">No inbounds configured</div>
              </div>
            </template>
            <template x-if="!nodeDetail||nodeDetail.id!==n.id">
              <div class="text-xs text-gray-600">Loading...</div>
            </template>
          </div>
        </div>
      </template>
    </div>
  </div>

  <!-- Stats Tab -->
  <div x-show="tab==='stats'">
    <h2 class="text-lg font-semibold text-white mb-4">Traffic Stats</h2>
    <div class="bg-gray-900 border border-gray-800 rounded-xl overflow-hidden">
      <table class="w-full text-sm">
        <thead><tr class="border-b border-gray-800 text-xs text-gray-500 uppercase tracking-wider">
          <th class="px-4 py-3 text-left">User</th>
          <th class="px-4 py-3 text-left">Used</th>
          <th class="px-4 py-3 text-left">Limit</th>
          <th class="px-4 py-3 text-left">Usage</th>
        </tr></thead>
        <tbody>
        <template x-for="s in statsUsers" :key="s.id">
          <tr class="border-b border-gray-800/50">
            <td class="px-4 py-3 text-gray-200" x-text="s.name"></td>
            <td class="px-4 py-3 text-xs font-mono text-gray-400" x-text="fmtBytes(s.used_bytes)"></td>
            <td class="px-4 py-3 text-xs font-mono text-gray-400" x-text="s.limit_bytes?fmtBytes(s.limit_bytes):'∞'"></td>
            <td class="px-4 py-3">
              <div class="w-32 h-1.5 bg-gray-800 rounded-full overflow-hidden">
                <div class="h-full rounded-full" :class="s.limit_bytes&&s.used_bytes/s.limit_bytes>0.8?'bg-red-500':'bg-blue-500'"
                     :style="'width:'+Math.min(100,s.limit_bytes?Math.round(s.used_bytes/s.limit_bytes*100):0)+'%'"></div>
              </div>
            </td>
          </tr>
        </template>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Create User Modal -->
  <div x-show="showCreateUser" class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm" @click.self="showCreateUser=false">
    <div class="bg-gray-900 border border-gray-800 rounded-xl p-6 w-full max-w-sm shadow-2xl">
      <h3 class="text-sm font-semibold text-white mb-4">New User</h3>
      <div class="space-y-3">
        <input x-model="newUser.name" placeholder="Username" class="w-full px-3 py-2 rounded-lg bg-gray-800 border border-gray-700 text-sm focus:outline-none focus:border-blue-500 transition placeholder-gray-600">
        <div class="flex items-center gap-2">
          <input x-model.number="newUser.traffic_limit_gb" type="number" placeholder="Limit" class="flex-1 px-3 py-2 rounded-lg bg-gray-800 border border-gray-700 text-sm focus:outline-none focus:border-blue-500 transition">
          <span class="text-xs text-gray-500">GB</span>
        </div>
        <input x-model="newUser.expire_at" type="date" class="w-full px-3 py-2 rounded-lg bg-gray-800 border border-gray-700 text-sm focus:outline-none focus:border-blue-500 transition text-gray-400">
      </div>
      <div class="flex justify-end gap-2 mt-5">
        <button @click="showCreateUser=false" class="px-3 py-1.5 text-xs text-gray-400 hover:text-white transition">Cancel</button>
        <button @click="createUser()" class="px-4 py-1.5 bg-blue-600 hover:bg-blue-500 text-white text-xs rounded-lg transition">Create</button>
      </div>
    </div>
  </div>

  <!-- Access Modal -->
  <div x-show="showAccess" class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm" @click.self="showAccess=false">
    <div class="bg-gray-900 border border-gray-800 rounded-xl p-6 w-full max-w-sm shadow-2xl">
      <h3 class="text-sm font-semibold text-white mb-1">Node Access</h3>
      <p class="text-xs text-gray-500 mb-4" x-text="accessUser?accessUser.name:''"></p>
      <div class="space-y-2 max-h-60 overflow-y-auto">
        <template x-for="n in nodes" :key="n.id">
          <label class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-gray-800/50 cursor-pointer transition">
            <input type="checkbox" :checked="accessNodeIds.includes(n.id)" @change="toggleAccess(n.id,$event.target.checked)"
                   class="w-3.5 h-3.5 rounded border-gray-600 bg-gray-800 text-blue-600 focus:ring-0 focus:ring-offset-0">
            <span class="text-sm text-gray-200" x-text="n.name"></span>
            <span class="text-xs text-gray-500 ml-auto" x-text="n.domain||n.host"></span>
          </label>
        </template>
      </div>
      <div class="flex justify-between mt-5">
        <button @click="grantAll()" class="px-3 py-1.5 text-xs text-blue-400 hover:text-blue-300 transition">Grant All</button>
        <button @click="showAccess=false" class="px-3 py-1.5 text-xs text-gray-400 hover:text-white transition">Done</button>
      </div>
    </div>
  </div>

  </main>
</div>
</template>
</div>

<script>
function fmtBytes(b){if(!b||b===0)return'0 B';const u=['B','KB','MB','GB','TB'];const i=Math.floor(Math.log(b)/Math.log(1024));return(b/Math.pow(1024,i)).toFixed(i>0?2:0)+' '+u[i]}

function app(){return{
  authed:!!localStorage.getItem('admin_token'),
  tokenInput:'',
  tab:'dash',
  users:[],nodes:[],statsUsers:[],
  toasts:[],
  showCreateUser:false,
  newUser:{name:'',traffic_limit_gb:100,expire_at:''},
  showAccess:false,accessUser:null,accessNodeIds:[],
  expandedNode:null,nodeDetail:null,

  async init(){if(this.authed)this.loadTab()},
  async login(){
    localStorage.setItem('admin_token',this.tokenInput);
    try{await this.api('/api/health');this.authed=true;this.loadTab()}
    catch(e){localStorage.removeItem('admin_token');this.toast('Invalid token','error')}
  },
  async loadTab(){
    try{
      if(this.tab==='dash'||this.tab==='users'){this.users=await this.api('/api/users')||[]}
      if(this.tab==='dash'||this.tab==='nodes'){this.nodes=await this.api('/api/nodes')||[]}
      if(this.tab==='stats'){this.statsUsers=await this.api('/api/stats/users')||[]}
    }catch(e){this.toast(e.message,'error')}
  },
  toast(msg,type='success'){this.toasts.push({id:Date.now()+Math.random(),msg,type})},
  async api(path,opts={}){
    const h={'Authorization':'Bearer '+localStorage.getItem('admin_token'),'Content-Type':'application/json'};
    const r=await fetch(path,{headers:h,...opts});
    const d=await r.json().catch(()=>null);
    if(!r.ok)throw new Error(d?.error||r.statusText);
    return d;
  },

  // Users
  async createUser(){
    if(!this.newUser.name){this.toast('Name required','error');return}
    const body={name:this.newUser.name,traffic_limit_bytes:Math.round(this.newUser.traffic_limit_gb*1073741824)};
    if(this.newUser.expire_at)body.expire_at=this.newUser.expire_at+' 00:00:00';
    await this.api('/api/users',{method:'POST',body:JSON.stringify(body)});
    this.showCreateUser=false;this.newUser={name:'',traffic_limit_gb:100,expire_at:''};
    this.toast('User created');this.loadTab();
  },
  async toggleUser(u){
    await this.api('/api/users/'+u.id,{method:'PUT',body:JSON.stringify({enabled:!u.enabled})});
    this.toast(u.name+(u.enabled?' disabled':' enabled'));this.loadTab();
  },
  async resetTraffic(u){
    if(!confirm('Reset traffic for '+u.name+'?'))return;
    await this.api('/api/users/'+u.id+'/reset-traffic',{method:'POST'});
    this.toast('Traffic reset');this.loadTab();
  },
  async deleteUser(u){
    if(!confirm('Delete '+u.name+'? This cannot be undone.'))return;
    await this.api('/api/users/'+u.id,{method:'DELETE'});
    this.toast('Deleted');this.loadTab();
  },
  copySubLink(u){
    navigator.clipboard.writeText(location.origin+'/sub/'+u.sub_token);
    this.toast('Subscription link copied');
  },

  // Access
  async showAccessModal(u){
    this.accessUser=u;this.showAccess=true;
    const nodes=await this.api('/api/users/'+u.id+'/access');
    this.accessNodeIds=(nodes||[]).map(n=>n.id);
  },
  async toggleAccess(nodeId,checked){
    const method=checked?'POST':'DELETE';
    await this.api('/api/users/'+this.accessUser.id+'/access',{method,body:JSON.stringify({node_id:nodeId})});
    if(checked){this.accessNodeIds.push(nodeId)}else{this.accessNodeIds=this.accessNodeIds.filter(x=>x!==nodeId)}
  },
  async grantAll(){
    await this.api('/api/users/'+this.accessUser.id+'/access',{method:'POST',body:JSON.stringify({all:true})});
    this.accessNodeIds=this.nodes.map(n=>n.id);this.toast('All nodes granted');
  },

  // Nodes
  async toggleNodeDetail(n){
    if(this.expandedNode===n.id){this.expandedNode=null;return}
    this.expandedNode=n.id;this.nodeDetail=null;
    this.nodeDetail=await this.api('/api/nodes/'+n.id);
  },
  async pushNode(n){
    if(!confirm('Push config to '+n.name+'? This restarts sing-box.'))return;
    try{await this.api('/api/nodes/'+n.id+'/push',{method:'POST'});this.toast('Pushed to '+n.name)}
    catch(e){this.toast('Push failed: '+e.message,'error')}
  },
  async generateNode(n){
    const cfg=await this.api('/api/nodes/'+n.id+'/generate',{method:'POST'});
    const w=window.open('','_blank');w.document.write('<pre style="background:#111;color:#eee;padding:20px;font-size:12px">'+JSON.stringify(cfg,null,2)+'</pre>');
  },
  async pushAll(){
    if(!confirm('Push config to ALL nodes?'))return;
    try{const r=await this.api('/api/batch/push-all',{method:'POST'});this.toast('Pushed to '+r.length+' nodes')}
    catch(e){this.toast('Push failed: '+e.message,'error')}
  }
}}
</script>
</body>
</html>

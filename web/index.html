<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SingBox Panel</title>
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<style>
[x-cloak]{display:none!important}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:3px}
.spin{animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body class="bg-gray-50 text-gray-700 min-h-screen antialiased">
<div x-data="app()" x-cloak>

<!-- Toasts -->
<div class="fixed bottom-4 right-4 z-[100] space-y-2">
  <template x-for="t in toasts" :key="t.id">
    <div :class="t.type==='error'?'border-red-200 bg-red-50 text-red-700':'border-emerald-200 bg-emerald-50 text-emerald-700'"
         class="px-4 py-2.5 rounded-lg text-sm border flex items-center gap-2 shadow-lg max-w-sm"
         x-init="setTimeout(()=>toasts=toasts.filter(x=>x.id!==t.id),4000)">
      <span x-text="t.type==='error'?'✕':'✓'" class="text-xs font-bold flex-shrink-0"></span>
      <span x-text="t.msg" class="break-all"></span>
    </div>
  </template>
</div>

<!-- Login -->
<template x-if="!authed">
<div class="flex items-center justify-center min-h-screen bg-gray-100">
  <div class="bg-white border border-gray-200 p-8 rounded-2xl w-full max-w-xs shadow-sm">
    <div class="text-center mb-6">
      <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center mx-auto mb-3 text-lg font-bold text-white">S</div>
      <h1 class="text-lg font-semibold text-gray-900">SingBox Panel</h1>
      <p class="text-xs text-gray-400 mt-1" x-text="T('loginHint')"></p>
    </div>
    <div class="space-y-3">
      <input x-model="loginUser" type="text" :placeholder="T('username')" autocomplete="username"
             class="w-full px-3 py-2.5 rounded-lg bg-gray-50 border border-gray-200 text-sm focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition placeholder-gray-400">
      <input x-model="loginPass" type="password" :placeholder="T('password')" autocomplete="current-password"
             class="w-full px-3 py-2.5 rounded-lg bg-gray-50 border border-gray-200 text-sm focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition placeholder-gray-400"
             @keydown.enter="login()">
    </div>
    <button @click="login()" class="w-full mt-4 bg-blue-600 hover:bg-blue-700 text-white py-2.5 rounded-lg text-sm font-medium transition" x-text="T('signIn')"></button>
    <div class="text-center mt-3">
      <button @click="showRegForm=!showRegForm" class="text-xs text-gray-400 hover:text-blue-600 transition" x-text="T('register')"></button>
    </div>
    <template x-if="showRegForm">
      <div class="mt-4 pt-4 border-t border-gray-100 space-y-3">
        <input x-model="regUser" type="text" :placeholder="T('username')" class="w-full px-3 py-2 rounded-lg bg-gray-50 border border-gray-200 text-sm focus:outline-none focus:border-blue-500 transition placeholder-gray-400">
        <input x-model="regPass" type="password" :placeholder="T('password')" class="w-full px-3 py-2 rounded-lg bg-gray-50 border border-gray-200 text-sm focus:outline-none focus:border-blue-500 transition placeholder-gray-400"
               @keydown.enter="doRegister()">
        <button @click="doRegister()" class="w-full bg-gray-100 hover:bg-gray-200 text-gray-700 py-2 rounded-lg text-sm transition" x-text="T('register')"></button>
      </div>
    </template>
  </div>
</div>
</template>

<!-- App -->
<template x-if="authed">
<div class="min-h-screen">
  <!-- Top Bar -->
  <header class="bg-white border-b border-gray-200 px-6 py-3 flex items-center justify-between sticky top-0 z-10">
    <div class="flex items-center gap-6">
      <span class="font-semibold text-gray-900 text-sm">SingBox Panel</span>
      <nav class="flex items-center gap-1">
        <template x-if="role==='admin'">
          <template x-for="t in [{id:'dash',k:'overview'},{id:'users',k:'users'},{id:'nodes',k:'nodes'},{id:'stats',k:'stats'}]">
            <button @click="tab=t.id;loadTab()" :class="tab===t.id?'bg-gray-100 text-gray-900':'text-gray-500 hover:text-gray-700 hover:bg-gray-50'"
                    class="px-3 py-1.5 rounded-md text-sm transition" x-text="T(t.k)"></button>
          </template>
        </template>
        <template x-if="role==='user'">
          <template x-for="t in [{id:'myinfo',k:'myInfo'}]">
            <button @click="tab=t.id;loadTab()" :class="tab===t.id?'bg-gray-100 text-gray-900':'text-gray-500 hover:text-gray-700 hover:bg-gray-50'"
                    class="px-3 py-1.5 rounded-md text-sm transition" x-text="T(t.k)"></button>
          </template>
        </template>
      </nav>
    </div>
    <div class="flex items-center gap-3">
      <span class="text-xs text-gray-400" x-text="currentUser"></span>
      <button @click="toggleLang()" class="text-xs text-gray-400 hover:text-gray-600 transition" x-text="lang==='zh'?'EN':'中文'"></button>
      <button @click="logout()" class="text-xs text-gray-400 hover:text-gray-600 transition" x-text="T('signOut')"></button>
    </div>
  </header>

  <!-- Content -->
  <main class="max-w-5xl mx-auto px-6 py-6">

  <!-- Overview -->
  <div x-show="tab==='dash'">
    <h2 class="text-lg font-semibold text-gray-900 mb-4" x-text="T('overview')"></h2>
    <div class="grid grid-cols-3 gap-4 mb-6">
      <div class="bg-white border border-gray-200 rounded-xl p-4">
        <div class="text-2xl font-bold text-gray-900" x-text="users.length"></div>
        <div class="text-xs text-gray-400 mt-1" x-text="T('users')"></div>
      </div>
      <div class="bg-white border border-gray-200 rounded-xl p-4">
        <div class="text-2xl font-bold text-gray-900" x-text="nodes.length"></div>
        <div class="text-xs text-gray-400 mt-1" x-text="T('nodes')"></div>
      </div>
      <div class="bg-white border border-gray-200 rounded-xl p-4">
        <div class="text-2xl font-bold text-gray-900" x-text="fmtBytes(users.reduce((a,u)=>a+u.traffic_used_bytes,0))"></div>
        <div class="text-xs text-gray-400 mt-1" x-text="T('totalTraffic')"></div>
      </div>
    </div>
    <div class="grid grid-cols-2 gap-4">
      <div class="bg-white border border-gray-200 rounded-xl p-4">
        <h3 class="text-xs font-medium text-gray-400 uppercase tracking-wider mb-3" x-text="T('users')"></h3>
        <template x-for="u in users" :key="u.id">
          <div class="flex items-center justify-between py-1.5 text-sm">
            <div class="flex items-center gap-2">
              <span :class="u.enabled?'bg-emerald-500':'bg-gray-300'" class="w-1.5 h-1.5 rounded-full"></span>
              <span x-text="u.name" class="text-gray-700"></span>
            </div>
            <span class="text-xs text-gray-400" x-text="fmtBytes(u.traffic_used_bytes)"></span>
          </div>
        </template>
      </div>
      <div class="bg-white border border-gray-200 rounded-xl p-4">
        <h3 class="text-xs font-medium text-gray-400 uppercase tracking-wider mb-3" x-text="T('nodes')"></h3>
        <template x-for="n in nodes" :key="n.id">
          <div class="flex items-center justify-between py-1.5 text-sm">
            <div class="flex items-center gap-2">
              <span :class="n.enabled?'bg-emerald-500':'bg-gray-300'" class="w-1.5 h-1.5 rounded-full"></span>
              <span x-text="n.name" class="text-gray-700"></span>
            </div>
            <span class="text-xs text-gray-400 font-mono" x-text="n.domain||n.host"></span>
          </div>
        </template>
      </div>
    </div>
  </div>

  <!-- Users Tab -->
  <div x-show="tab==='users'">
    <div class="flex items-center justify-between mb-4">
      <h2 class="text-lg font-semibold text-gray-900" x-text="T('users')"></h2>
      <button @click="showCreateUser=true" class="px-3 py-1.5 bg-blue-600 hover:bg-blue-700 text-white text-xs rounded-lg transition" x-text="'+ '+T('newUser')"></button>
    </div>
    <div class="bg-white border border-gray-200 rounded-xl overflow-hidden">
      <table class="w-full text-sm">
        <thead><tr class="border-b border-gray-100 text-xs text-gray-400 uppercase tracking-wider">
          <th class="px-4 py-3 text-left" x-text="T('user')"></th>
          <th class="px-4 py-3 text-left" x-text="T('traffic')"></th>
          <th class="px-4 py-3 text-left" x-text="T('expires')"></th>
          <th class="px-4 py-3 text-left" x-text="T('subscription')"></th>
          <th class="px-4 py-3 text-right" x-text="T('actions')"></th>
        </tr></thead>
        <tbody>
        <template x-for="u in users" :key="u.id">
          <tr class="border-b border-gray-50 hover:bg-gray-50/50 transition">
            <td class="px-4 py-3">
              <div class="flex items-center gap-2">
                <span :class="u.enabled?'bg-emerald-500':'bg-red-400'" class="w-2 h-2 rounded-full flex-shrink-0"></span>
                <span x-text="u.name" class="text-gray-900 font-medium"></span>
              </div>
            </td>
            <td class="px-4 py-3">
              <div class="flex items-center gap-2">
                <div class="w-20 h-1.5 bg-gray-100 rounded-full overflow-hidden">
                  <div class="h-full rounded-full" :class="u.traffic_limit_bytes&&u.traffic_used_bytes/u.traffic_limit_bytes>0.8?'bg-red-500':'bg-blue-500'"
                       :style="'width:'+Math.min(100,u.traffic_limit_bytes?Math.round(u.traffic_used_bytes/u.traffic_limit_bytes*100):0)+'%'"></div>
                </div>
                <span class="text-xs text-gray-400" x-text="fmtBytes(u.traffic_used_bytes)+' / '+(u.traffic_limit_bytes?fmtBytes(u.traffic_limit_bytes):'∞')"></span>
              </div>
            </td>
            <td class="px-4 py-3 text-xs text-gray-400" x-text="u.expire_at||'—'"></td>
            <td class="px-4 py-3">
              <button @click="copySubLink(u)" class="text-xs text-blue-600 hover:text-blue-700 transition" x-text="T('copyLink')"></button>
            </td>
            <td class="px-4 py-3">
              <div class="flex items-center justify-end gap-1">
                <button @click="editUser(u)" class="px-2 py-1 text-xs text-blue-500 hover:bg-blue-50 rounded transition">Edit</button>
                <button @click="resetTraffic(u)" class="px-2 py-1 text-xs text-gray-500 hover:bg-gray-100 rounded transition" x-text="T('reset')"></button>
                <button @click="deleteUser(u)" class="px-2 py-1 text-xs text-red-400 hover:bg-red-50 rounded transition" x-text="T('del')"></button>
              </div>
            </td>
          </tr>
        </template>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Nodes Tab -->
  <div x-show="tab==='nodes'">
    <div class="flex items-center justify-between mb-4">
      <h2 class="text-lg font-semibold text-gray-900" x-text="T('nodes')"></h2>
      <div class="flex items-center gap-2">
        <button @click="showCreateNode=true" class="px-3 py-1.5 bg-blue-600 hover:bg-blue-700 text-white text-xs rounded-lg transition" x-text="'+ '+T('newNode')"></button>
        <button @click="pushAll()" class="px-3 py-1.5 bg-orange-500 hover:bg-orange-600 text-white text-xs rounded-lg transition" x-text="T('pushAll')"></button>
      </div>
    </div>
    <div class="space-y-3">
      <template x-for="n in nodes" :key="n.id">
        <div class="bg-white border border-gray-200 rounded-xl overflow-hidden">
          <div class="flex items-center justify-between px-4 py-3 cursor-pointer hover:bg-gray-50/50 transition" @click="toggleNodeDetail(n)">
            <div class="flex items-center gap-3">
              <span :class="n.enabled?'bg-emerald-500':'bg-gray-300'" class="w-2 h-2 rounded-full"></span>
              <span x-text="n.name" class="text-gray-900 font-medium text-sm"></span>
              <span x-text="n.domain||''" class="text-xs text-blue-500 font-mono"></span>
              <span x-text="n.host" class="text-xs text-gray-400 font-mono"></span>
            </div>
            <div class="flex items-center gap-1">
              <button @click.stop="moveNode(n,-1)" class="text-gray-300 hover:text-gray-600 text-xs px-1" title="Move up">▲</button>
              <button @click.stop="moveNode(n,1)" class="text-gray-300 hover:text-gray-600 text-xs px-1" title="Move down">▼</button>
              <template x-if="nodeStatuses[n.id]">
                <div class="flex items-center gap-1.5 mr-2">
                  <span :class="nodeStatuses[n.id].running?'bg-emerald-500':'bg-yellow-400'" class="w-1.5 h-1.5 rounded-full"></span>
                  <span class="text-[10px] text-gray-400" x-text="nodeStatuses[n.id].version||T('notInstalled')"></span>
                  <span class="text-[10px] text-gray-400" x-text="nodeStatuses[n.id].ping_ms?nodeStatuses[n.id].ping_ms+'ms':''"></span>
                </div>
              </template>
              <span class="text-gray-300 text-xs" x-text="expandedNodes[n.id]?'▾':'▸'"></span>
            </div>
          </div>
          <!-- Expanded Detail -->
          <div x-show="expandedNodes[n.id]" class="border-t border-gray-100">
            <!-- Action Buttons -->
            <div class="px-4 py-3 bg-gray-50/80 flex flex-wrap items-center gap-2 border-b border-gray-100">
              <button @click.stop="checkNodeStatus(n)" class="px-2.5 py-1.5 text-xs border border-gray-200 bg-white hover:bg-gray-50 text-gray-600 rounded-md transition" x-text="T('checkStatus')"></button>
              <button @click.stop="showSetupSSHModal(n)" class="px-2.5 py-1.5 text-xs border border-gray-200 bg-white hover:bg-gray-50 text-gray-600 rounded-md transition" x-text="T('setupSSH')"></button>
              <button @click.stop="installSingbox(n)" class="px-2.5 py-1.5 text-xs border border-gray-200 bg-white hover:bg-gray-50 text-gray-600 rounded-md transition" x-text="T('install')"></button>
              <button @click.stop="showAutoSetupModal(n)" class="px-2.5 py-1.5 text-xs border border-blue-200 bg-blue-50 hover:bg-blue-100 text-blue-700 rounded-md transition font-medium" x-text="T('autoSetup')"></button>
              <div class="flex-1"></div>
              <button @click.stop="pushNode(n)" class="px-2.5 py-1.5 text-xs border border-orange-200 bg-orange-50 hover:bg-orange-100 text-orange-700 rounded-md transition" x-text="T('push')"></button>
              <button @click.stop="generateNode(n)" class="px-2.5 py-1.5 text-xs border border-gray-200 bg-white hover:bg-gray-50 text-gray-600 rounded-md transition" x-text="T('preview')"></button>
              <button @click.stop="showRawConfig(n)" class="px-2.5 py-1.5 text-xs border border-gray-200 bg-white hover:bg-gray-50 text-gray-600 rounded-md transition" x-text="T('rawConfig')"></button>
              <button @click.stop="deleteNode(n)" class="px-2.5 py-1.5 text-xs border border-red-200 bg-white hover:bg-red-50 text-red-500 rounded-md transition" x-text="T('del')"></button>
            </div>
            <!-- System Info -->
            <template x-if="nodeStatuses[n.id]&&nodeStatuses[n.id].reachable">
              <div class="px-4 py-2 bg-gray-50/50 border-b border-gray-100 flex flex-wrap gap-4 text-[11px] text-gray-500">
                <span x-show="nodeStatuses[n.id].ping_ms"><span class="text-gray-400">Ping</span> <span class="font-mono" x-text="nodeStatuses[n.id].ping_ms+'ms'" :class="nodeStatuses[n.id].ping_ms<100?'text-emerald-600':nodeStatuses[n.id].ping_ms<300?'text-yellow-600':'text-red-500'"></span></span>
                <span x-show="nodeStatuses[n.id].mem_total"><span class="text-gray-400">Mem</span> <span class="font-mono" x-text="fmtBytes(nodeStatuses[n.id].mem_total-nodeStatuses[n.id].mem_available)+' / '+fmtBytes(nodeStatuses[n.id].mem_total)"></span></span>
                <span x-show="nodeStatuses[n.id].disk_total"><span class="text-gray-400">Disk</span> <span class="font-mono" x-text="fmtBytes(nodeStatuses[n.id].disk_used)+' / '+fmtBytes(nodeStatuses[n.id].disk_total)"></span></span>
                <span x-show="nodeStatuses[n.id].uptime"><span class="text-gray-400">Up</span> <span class="font-mono" x-text="fmtUptime(nodeStatuses[n.id].uptime)"></span></span>
              </div>
            </template>
            <!-- Inbounds -->
            <div class="px-4 py-3">
              <div class="text-xs text-gray-400 mb-2 font-medium" x-text="T('inbounds')"></div>
              <template x-if="nodeDetails[n.id]">
                <div class="space-y-1">
                  <template x-for="ib in nodeDetails[n.id].inbounds||[]" :key="ib.id">
                    <div class="flex items-center gap-3 text-xs py-1.5 px-2 rounded hover:bg-gray-50">
                      <span class="inline-flex items-center px-2 py-0.5 rounded text-[10px] font-medium"
                            :class="ib.protocol==='hysteria2'?'bg-purple-100 text-purple-700':ib.protocol==='vless-reality'?'bg-emerald-100 text-emerald-700':'bg-sky-100 text-sky-700'"
                            x-text="ib.protocol"></span>
                      <span class="text-gray-700 font-mono" x-text="':'+ib.port"></span>
                      <span class="text-gray-400" x-text="ib.tag"></span>
                      <div class="ml-auto flex items-center gap-1">
                        <button @click.stop="moveInbound(n,ib,-1)" class="text-gray-300 hover:text-gray-600 px-0.5">▲</button>
                        <button @click.stop="moveInbound(n,ib,1)" class="text-gray-300 hover:text-gray-600 px-0.5">▼</button>
                        <button @click.stop="deleteInbound(ib)" class="text-red-300 hover:text-red-500 transition text-[10px] ml-1">✕</button>
                      </div>
                    </div>
                  </template>
                  <div x-show="!(nodeDetails[n.id]?.inbounds?.length)" class="text-xs text-gray-400 italic py-1" x-text="T('noInbounds')"></div>
                </div>
              </template>
            </div>
          </div>
        </div>
      </template>
    </div>
  </div>

  <!-- Stats Tab -->
  <div x-show="tab==='stats'" x-init="$watch('tab',v=>{if(v==='stats')loadStats()})">
    <div class="flex items-center justify-between mb-4">
      <h2 class="text-lg font-semibold text-gray-900" x-text="T('trafficStats')"></h2>
      <select x-model="statsDays" @change="loadStats()" class="px-2 py-1 text-xs border border-gray-200 rounded-lg bg-white">
        <option value="7">7 days</option>
        <option value="14">14 days</option>
        <option value="30">30 days</option>
      </select>
    </div>
    <!-- Chart -->
    <div class="bg-white border border-gray-200 rounded-xl p-4 mb-4">
      <div class="text-xs text-gray-400 mb-2" x-text="lang==='zh'?'每日流量趋势':'Daily Traffic Trend'"></div>
      <div class="h-40 relative" x-ref="chartWrap">
        <svg width="100%" height="100%" :viewBox="'0 0 '+(statsChart.w||600)+' 160'" preserveAspectRatio="none" x-show="statsChart.points?.length">
          <polyline :points="statsChart.upLine||''" fill="none" stroke="#3b82f6" stroke-width="2" stroke-linejoin="round"/>
          <polyline :points="statsChart.downLine||''" fill="none" stroke="#22c55e" stroke-width="2" stroke-linejoin="round"/>
          <template x-for="(p,i) in statsChart.points||[]" :key="i">
            <g>
              <circle :cx="p.x" :cy="p.uy" r="3" fill="#3b82f6" opacity="0.7"/>
              <circle :cx="p.x" :cy="p.dy" r="3" fill="#22c55e" opacity="0.7"/>
              <title x-text="p.day+' ↑'+fmtBytes(p.up)+' ↓'+fmtBytes(p.down)"></title>
            </g>
          </template>
        </svg>
        <div x-show="!statsChart.points?.length" class="absolute inset-0 flex items-center justify-center text-xs text-gray-300" x-text="lang==='zh'?'暂无数据':'No data'"></div>
      </div>
      <div class="flex items-center gap-4 mt-2 text-[11px] text-gray-400">
        <span><span class="inline-block w-3 h-0.5 bg-blue-500 mr-1 align-middle"></span>Upload</span>
        <span><span class="inline-block w-3 h-0.5 bg-emerald-500 mr-1 align-middle"></span>Download</span>
      </div>
    </div>
    <!-- User stats -->
    <div class="bg-white border border-gray-200 rounded-xl overflow-hidden mb-4">
      <div class="px-4 py-2 border-b border-gray-100 text-xs text-gray-400 font-medium" x-text="lang==='zh'?'用户流量':'User Traffic'"></div>
      <table class="w-full text-sm">
        <thead><tr class="border-b border-gray-100 text-xs text-gray-400 uppercase tracking-wider">
          <th class="px-4 py-2 text-left" x-text="T('user')"></th>
          <th class="px-4 py-2 text-left">↑ Upload</th>
          <th class="px-4 py-2 text-left">↓ Download</th>
          <th class="px-4 py-2 text-left" x-text="T('limit')"></th>
          <th class="px-4 py-2 text-left" x-text="T('usage')"></th>
        </tr></thead>
        <tbody>
        <template x-for="s in statsUsers" :key="s.id">
          <tr class="border-b border-gray-50">
            <td class="px-4 py-2 text-gray-700" x-text="s.name"></td>
            <td class="px-4 py-2 text-xs font-mono text-blue-500" x-text="fmtBytes(s.up_bytes||0)"></td>
            <td class="px-4 py-2 text-xs font-mono text-emerald-500" x-text="fmtBytes(s.down_bytes||0)"></td>
            <td class="px-4 py-2 text-xs font-mono text-gray-500" x-text="s.limit_bytes?fmtBytes(s.limit_bytes):'∞'"></td>
            <td class="px-4 py-2">
              <div class="w-24 h-1.5 bg-gray-100 rounded-full overflow-hidden">
                <div class="h-full rounded-full" :class="s.limit_bytes&&s.used_bytes/s.limit_bytes>0.8?'bg-red-500':'bg-blue-500'"
                     :style="'width:'+Math.min(100,s.limit_bytes?Math.round(s.used_bytes/s.limit_bytes*100):0)+'%'"></div>
              </div>
            </td>
          </tr>
        </template>
        </tbody>
      </table>
    </div>
    <!-- Node stats -->
    <div class="bg-white border border-gray-200 rounded-xl overflow-hidden">
      <div class="px-4 py-2 border-b border-gray-100 text-xs text-gray-400 font-medium" x-text="lang==='zh'?'节点流量':'Node Traffic'"></div>
      <table class="w-full text-sm">
        <thead><tr class="border-b border-gray-100 text-xs text-gray-400 uppercase tracking-wider">
          <th class="px-4 py-2 text-left" x-text="T('nodes')"></th>
          <th class="px-4 py-2 text-left">↑ Upload</th>
          <th class="px-4 py-2 text-left">↓ Download</th>
        </tr></thead>
        <tbody>

<script>
function fmtBytes(b){if(!b||b===0)return'0 B';const u=['B','KB','MB','GB','TB'];const i=Math.floor(Math.log(b)/Math.log(1024));return(b/Math.pow(1024,i)).toFixed(i>0?2:0)+' '+u[i]}
function fmtUptime(s){if(!s)return'';const d=Math.floor(s/86400),h=Math.floor(s%86400/3600);return d>0?d+'d '+h+'h':h+'h'}

const I18N={
  en:{overview:'Overview',users:'Users',nodes:'Nodes',stats:'Stats',signOut:'Sign out',signIn:'Sign In',loginHint:'Sign in to continue',
    totalTraffic:'Total Traffic',user:'User',traffic:'Traffic',expires:'Expires',subscription:'Sub',actions:'Actions',newUser:'New User',newNode:'New Node',

    nodeName:'Node name',domainOptional:'Domain (optional, for Hysteria2/HTTPUpgrade)',
    setupSSH:'Setup SSH',install:'Install',autoSetup:'Auto Setup',checkStatus:'Status',rawConfig:'Raw Config',
    rootPassword:'Root password',sshHint:'Inject panel SSH key to the node for key-based auth',confirm:'Confirm',working:'Working...',
    domain:'Domain',protocols:'Protocols',needsDomain:'needs domain',noDomain:'no domain needed',forCDN:'for CDN/blocked IP',
    autoSetupDomainHint:'Leave empty to use node domain. With domain: Hy2+Reality. Without: Reality only.',
    startSetup:'Start Setup',notInstalled:'not installed',
    register:'Register',myInfo:'My Info',myNodes:'My Nodes',noNodes:'No accessible nodes',copy:'Copy',copied:'Copied',
    regSuccess:'Registered! Waiting for admin approval.',invalidCreds:'Invalid credentials',notApproved:'Account not yet approved'},
  zh:{overview:'概览',users:'用户',nodes:'节点',stats:'统计',signOut:'退出',signIn:'登录',loginHint:'请登录以继续',
    totalTraffic:'总流量',user:'用户',traffic:'流量',expires:'到期',subscription:'订阅',actions:'操作',newUser:'新建用户',newNode:'新建节点',
    copyLink:'复制链接',access:'权限',reset:'重置',del:'删除',push:'推送',preview:'预览',pushAll:'推送全部',inbounds:'入站协议',
    noInbounds:'暂无协议 — 使用一键配置添加',trafficStats:'流量统计',used:'已用',limit:'限额',usage:'用量',
    username:'用户名',password:'密码',cancel:'取消',create:'创建',nodeAccess:'节点权限',grantAll:'全部授权',done:'完成',
    nodeName:'节点名称',domainOptional:'域名（可选，Hysteria2/HTTPUpgrade需要）',
    setupSSH:'配置SSH',install:'安装',autoSetup:'一键配置',checkStatus:'检测状态',rawConfig:'原始配置',
    rootPassword:'Root密码',sshHint:'注入面板SSH公钥到节点，实现免密连接',confirm:'确认',working:'执行中...',
    domain:'域名',protocols:'协议',needsDomain:'需要域名',noDomain:'无需域名',forCDN:'CDN/被墙IP使用',
    autoSetupDomainHint:'留空使用节点域名。有域名→Hy2+Reality，无域名→仅Reality',
    startSetup:'开始配置',notInstalled:'未安装',
    register:'注册',myInfo:'我的信息',myNodes:'我的节点',noNodes:'暂无可用节点',copy:'复制',copied:'已复制',
    regSuccess:'注册成功，等待管理员审核',invalidCreds:'用户名或密码错误',notApproved:'账号待审核'}
};

function app(){return{
  authed:!!localStorage.getItem('panel_jwt'),
  role:localStorage.getItem('panel_role')||'',
  currentUser:localStorage.getItem('panel_user')||'',
  loginUser:'',loginPass:'',
  showRegForm:false,regUser:'',regPass:'',
  lang:localStorage.getItem('panel_lang')||(navigator.language.startsWith('zh')?'zh':'en'),
  tab:'',
  users:[],nodes:[],statsUsers:[],statsNodes:[],statsDays:'7',statsChart:{},
  meData:null,myNodes:[],
  toasts:[],
  showCreateUser:false,
  newUser:{name:'',traffic_limit_gb:100,expire_at:''},
  showEditUser:false,
  editingUser:{id:0,name:'',enabled:true,node_ids:[],traffic_limit_gb:0,expire_at:'',traffic_reset_day:1},
  savingUser:false,
  showCreateNode:false,
  newNode:{name:'',host:'',domain:'',port:22,ssh_user:'root'},
  expandedNodes:{},nodeDetails:{},nodeStatuses:{},
  showSSHSetup:false,sshNode:null,sshPassword:'',
  showAutoSetup:false,autoSetupNode:null,autoSetupDomain:'',autoSetupProtos:[],
  showRawCfg:false,rawCfgNode:null,rawCfgContent:'',
  opLoading:false,

  T(k){return I18N[this.lang]?.[k]||I18N.en[k]||k},
  toggleLang(){this.lang=this.lang==='zh'?'en':'zh';localStorage.setItem('panel_lang',this.lang)},

  async init(){
    if(this.authed){
      this.tab=this.role==='admin'?'dash':'myinfo';
      this.loadTab();
    }
  },
  async login(){
    try{
      const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:this.loginUser,password:this.loginPass})});
      const d=await r.json();
      if(!r.ok){this.toast(d.error||this.T('invalidCreds'),'error');return}
      localStorage.setItem('panel_jwt',d.token);
      localStorage.setItem('panel_role',d.role);
      localStorage.setItem('panel_user',d.username);
      this.authed=true;this.role=d.role;this.currentUser=d.username;
      this.tab=d.role==='admin'?'dash':'myinfo';
      this.loadTab();
    }catch(e){this.toast(e.message,'error')}
  },
  async doRegister(){
    if(!this.regUser||!this.regPass){this.toast(this.T('username')+' & '+this.T('password')+' required','error');return}
    try{
      const r=await fetch('/api/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:this.regUser,password:this.regPass})});
      const d=await r.json();
      if(!r.ok){this.toast(d.error,'error');return}
      this.toast(this.T('regSuccess'));this.showRegForm=false;this.regUser='';this.regPass='';
    }catch(e){this.toast(e.message,'error')}
  },
  logout(){this.authed=false;this.role='';this.currentUser='';localStorage.removeItem('panel_jwt');localStorage.removeItem('panel_role');localStorage.removeItem('panel_user')},
  async loadTab(){
    try{
      if(this.role==='admin'){
        if(this.tab==='dash'||this.tab==='users'){this.users=await this.api('/api/users')||[]}
        if(this.tab==='dash'||this.tab==='nodes'){this.nodes=await this.api('/api/nodes')||[]}
        if(this.tab==='stats'){this.loadStats()}
      }
      if(this.tab==='myinfo'){
        this.meData=await this.api('/api/me');
        this.myNodes=await this.api('/api/me/nodes')||[];
      }
    }catch(e){if(e.message==='unauthorized'||e.message==='invalid token'){this.logout()}else{this.toast(e.message,'error')}}
  },
  async loadStats(){
    const [users, nodes, history] = await Promise.all([
      this.api('/api/stats/users'),
      this.api('/api/stats/nodes'),
      this.api('/api/stats/traffic?days='+this.statsDays)
    ]);
    this.statsUsers = users || [];
    this.statsNodes = nodes || [];
    this.buildChart(history || []);
  },
  buildChart(data){
    if(!data.length){this.statsChart={};return}
    const w=600, h=140, px=30, py=10;
    const maxVal=Math.max(...data.map(d=>Math.max(d.up,d.down)),1);
    const points=data.map((d,i)=>{
      const x=px+i*(w-2*px)/(data.length-1||1);
      return {x, uy:py+(1-d.up/maxVal)*(h-2*py), dy:py+(1-d.down/maxVal)*(h-2*py), day:d.day, up:d.up, down:d.down};
    });
    this.statsChart={
      w, points,
      upLine: points.map(p=>p.x+','+p.uy).join(' '),
      downLine: points.map(p=>p.x+','+p.dy).join(' ')
    };
  },
  toast(msg,type='success'){this.toasts.push({id:Date.now()+Math.random(),msg,type})},
  async api(path,opts={}){
    const h={'Authorization':'Bearer '+localStorage.getItem('panel_jwt'),'Content-Type':'application/json'};
    const r=await fetch(path,{headers:h,...opts});
    const d=await r.json().catch(()=>null);
    if(!r.ok)throw new Error(d?.error||r.statusText);
    return d;
  },

  async createUser(){
    if(!this.newUser.name){this.toast(this.T('username')+' required','error');return}
    const body={name:this.newUser.name,traffic_limit_bytes:Math.round(this.newUser.traffic_limit_gb*1073741824)};
    if(this.newUser.expire_at)body.expire_at=this.newUser.expire_at+' 00:00:00';
    await this.api('/api/users',{method:'POST',body:JSON.stringify(body)});
    this.showCreateUser=false;this.newUser={name:'',traffic_limit_gb:100,expire_at:''};
    this.toast(this.lang==='zh'?'用户已创建':'User created');this.loadTab();
  },
  async editUser(u){
    try{
      const requests=[this.api('/api/users/'+u.id+'/access')];
      if(!this.nodes.length)requests.push(this.api('/api/nodes'));
      const results=await Promise.all(requests);
      const access=results[0]||[];
      if(results[1])this.nodes=results[1];
      this.editingUser={
        id:u.id, name:u.name, enabled:u.enabled,
        node_ids:access.map(n=>n.id),
        traffic_limit_gb: u.traffic_limit_bytes ? Math.round(u.traffic_limit_bytes/1073741824*100)/100 : 0,
        expire_at: u.expire_at ? u.expire_at.split(' ')[0] : '',
        traffic_reset_day: u.traffic_reset_day || 1
      };
      this.showEditUser=true;
    }catch(e){this.toast(e.message,'error')}
  },
  async saveEditUser(){
    const u=this.editingUser;
    const body={
      enabled:u.enabled,
      node_ids:u.node_ids.map(Number),
      traffic_limit_bytes:Math.round(u.traffic_limit_gb*1073741824),
      expire_at: u.expire_at ? u.expire_at+' 00:00:00' : '',
      traffic_reset_day: u.traffic_reset_day
    };
    this.savingUser=true;
    try{
      const result=await this.api('/api/users/'+u.id,{method:'PUT',body:JSON.stringify(body)});
      const sync=result.sync||[];
      const pushed=sync.filter(r=>r.status==='pushed').length;
      this.showEditUser=false;
      this.toast(this.lang==='zh'?`已保存，同步 ${pushed} 个节点`:`Saved, synced ${pushed} node(s)`);
      await this.loadTab();
    }catch(e){this.toast(e.message,'error')}
    finally{this.savingUser=false}
  },
  async resetTraffic(u){
    if(!confirm((this.lang==='zh'?'重置流量：':'Reset traffic for ')+u.name+'?'))return;
    try{
      await this.api('/api/users/'+u.id+'/reset-traffic',{method:'POST'});
      this.toast(this.lang==='zh'?'流量已重置并同步节点':'Traffic reset and nodes synchronized');this.loadTab();
    }catch(e){this.toast(e.message,'error')}
  },
  async deleteUser(u){
    const warning=this.lang==='zh'
      ?`删除用户 ${u.name}？面板会先从所有节点移除该用户，成功后再删除账号。`
      :`Delete ${u.name}? The user will be removed from every node before the account is deleted.`;
    if(!confirm(warning))return;
    try{
      await this.api('/api/users/'+u.id,{method:'DELETE'});
      this.toast(this.lang==='zh'?'用户已从节点移除并删除':'User removed from nodes and deleted');this.loadTab();
    }catch(e){this.toast(e.message,'error')}
  },
  copySubLink(u){
    navigator.clipboard.writeText(location.origin+'/sub/'+u.sub_token);
    this.toast(this.lang==='zh'?'订阅链接已复制':'Link copied');
  },

  async createNode(){
    if(!this.newNode.name||!this.newNode.host){this.toast('Name and host required','error');return}
    const body={name:this.newNode.name,host:this.newNode.host,domain:this.newNode.domain||'',port:this.newNode.port||22,ssh_user:this.newNode.ssh_user||'root',proxy_type:'singbox'};
    await this.api('/api/nodes',{method:'POST',body:JSON.stringify(body)});
    this.showCreateNode=false;this.newNode={name:'',host:'',domain:'',port:22,ssh_user:'root'};
    this.toast(this.lang==='zh'?'节点已创建':'Node created');this.loadTab();
  },
  async deleteNode(n){
    const warning=this.lang==='zh'
      ?`删除节点 ${n.name}？仅允许删除已移除全部入站和用户权限的节点。`
      :`Delete node ${n.name}? Deletion is allowed only after all inbounds and user access are removed.`;
    if(!confirm(warning))return;
    try{
      await this.api('/api/nodes/'+n.id,{method:'DELETE'});
      this.toast(this.lang==='zh'?'节点已安全停用并删除':'Node safely decommissioned and deleted');
      this.loadTab();
    }catch(e){this.toast(e.message,'error')}
  },
  async deleteInbound(ib){
    const warning=this.lang==='zh'
      ?`删除协议 ${ib.protocol}？保存后会立即同步节点，使用该协议的旧订阅将失效。`
      :`Delete ${ib.protocol}? The node will sync immediately and existing subscriptions for this inbound will stop working.`;
    if(!confirm(warning))return;
    try{
      await this.api('/api/inbounds/'+ib.id,{method:'DELETE'});
      this.toast(this.lang==='zh'?'协议已删除并同步节点':'Inbound deleted and node synchronized');
      const nodeId=ib.node_id;if(nodeId&&this.nodeDetails[nodeId])this.nodeDetails[nodeId]=await this.api('/api/nodes/'+nodeId);
    }catch(e){this.toast(e.message,'error')}
  },
  async moveNode(n, dir){
    const idx=this.nodes.findIndex(x=>x.id===n.id);
    const swapIdx=idx+dir;
    if(swapIdx<0||swapIdx>=this.nodes.length)return;
    [this.nodes[idx],this.nodes[swapIdx]]=[this.nodes[swapIdx],this.nodes[idx]];
    const items=this.nodes.map((x,i)=>({id:x.id,sort_order:i}));
    await this.api('/api/nodes/reorder',{method:'PUT',body:JSON.stringify(items)});
    this.loadTab();
  },
  async moveInbound(n, ib, dir){
    const ibs=this.nodeDetails[n.id]?.inbounds;if(!ibs)return;
    const idx=ibs.findIndex(x=>x.id===ib.id);
    const swapIdx=idx+dir;
    if(swapIdx<0||swapIdx>=ibs.length)return;
    [ibs[idx],ibs[swapIdx]]=[ibs[swapIdx],ibs[idx]];
    const items=ibs.map((x,i)=>({id:x.id,sort_order:i}));
    await this.api('/api/nodes/'+n.id+'/inbounds/reorder',{method:'PUT',body:JSON.stringify(items)});
    this.nodeDetails[n.id]=await this.api('/api/nodes/'+n.id);
  },

  async toggleNodeDetail(n){
    if(this.expandedNodes[n.id]){delete this.expandedNodes[n.id];return}
    this.expandedNodes[n.id]=true;
    this.nodeDetails[n.id]=await this.api('/api/nodes/'+n.id);
  },
  async checkNodeStatus(n){
    try{
      const s=await this.api('/api/nodes/'+n.id+'/status');
      // Client-side ping: measure TCP connect time to node
      s.ping_ms = await this.pingNode(n);
      this.nodeStatuses[n.id]=s;
      this.toast(n.name+': '+(s.running?'running':'stopped')+' '+(s.version||'')+' ping='+s.ping_ms+'ms');
    }catch(e){this.toast(e.message,'error')}
  },
  async pingNode(n){
    const target = n.domain || n.host;
    const port = 443;
    const url = 'https://'+target+':'+port;
    const t0 = performance.now();
    try{ await fetch(url,{mode:'no-cors',cache:'no-store',signal:AbortSignal.timeout(3000)}); }catch(_){}
    return Math.round(performance.now()-t0);
  },
  showSetupSSHModal(n){this.sshNode=n;this.sshPassword='';this.showSSHSetup=true},
  async doSetupSSH(){
    if(!this.sshPassword){this.toast('Password required','error');return}
    this.opLoading=true;
    try{
      const r=await this.api('/api/nodes/'+this.sshNode.id+'/setup-ssh',{method:'POST',body:JSON.stringify({password:this.sshPassword})});
      this.toast(r.status==='ready'?(this.lang==='zh'?'SSH配置成功':'SSH configured'):(r.status||'done'));
      this.showSSHSetup=false;
    }catch(e){this.toast(e.message,'error')}
    this.opLoading=false;
  },
  async installSingbox(n){
    if(!confirm((this.lang==='zh'?'安装/升级 sing-box 到 ':'Install/upgrade sing-box on ')+n.name+'?'))return;
    this.opLoading=true;
    try{
      const r=await this.api('/api/nodes/'+n.id+'/install',{method:'POST',body:JSON.stringify({version:'latest'})});
      this.toast(n.name+': '+r.version+' installed');
      this.nodeStatuses[n.id]={reachable:true,installed:true,version:r.version,running:true};
    }catch(e){this.toast(e.message,'error')}
    this.opLoading=false;
  },
  async showAutoSetupModal(n){
    this.autoSetupNode=n;this.autoSetupDomain=n.domain||'';
    try{
      const detail=this.nodeDetails[n.id]||await this.api('/api/nodes/'+n.id);
      const existing=[...new Set((detail.inbounds||[]).map(ib=>ib.protocol))];
      this.autoSetupProtos=existing.length?existing:(n.domain?['hysteria2','vless-reality']:['vless-reality']);
    }catch(e){
      this.toast(e.message,'error');return;
    }
    this.showAutoSetup=true;
  },
  async doAutoSetup(){
    this.opLoading=true;
    try{
      const body={domain:this.autoSetupDomain};
      if(this.autoSetupProtos.length)body.protocols=this.autoSetupProtos;
      const r=await this.api('/api/nodes/'+this.autoSetupNode.id+'/auto-setup',{method:'POST',body:JSON.stringify(body)});
      const changed=(r.inbounds||[]).filter(x=>x.status==='ok'||x.status==='updated').length;
      this.toast((this.lang==='zh'?'配置完成并已同步，':'Setup complete and synchronized, ')+changed+(this.lang==='zh'?' 个协议有变更':' protocol(s) changed'));
      this.showAutoSetup=false;this.loadTab();
      if(this.expandedNodes[this.autoSetupNode.id])this.nodeDetails[this.autoSetupNode.id]=await this.api('/api/nodes/'+this.autoSetupNode.id);
    }catch(e){this.toast(e.message,'error')}
    this.opLoading=false;
  },
  async pushNode(n){
    if(!confirm((this.lang==='zh'?'推送配置到 ':'Push config to ')+n.name+'?'))return;
    try{await this.api('/api/nodes/'+n.id+'/push',{method:'POST'});this.toast((this.lang==='zh'?'已推送到 ':'Pushed to ')+n.name)}
    catch(e){this.toast(e.message,'error')}
  },
  async generateNode(n){
    this.rawCfgNode=n;this.rawCfgContent='loading...';this.showRawCfg=true;
    try{
      const cfg=await this.api('/api/nodes/'+n.id+'/generate',{method:'POST'});
      this.rawCfgContent=JSON.stringify(cfg,null,2);
    }catch(e){this.rawCfgContent='// '+e.message}
  },
  async showRawConfig(n){
    this.rawCfgNode=n;this.rawCfgContent='';this.showRawCfg=true;
    try{
      const r=await this.api('/api/nodes/'+n.id+'/raw-config');
      this.rawCfgContent=typeof r==='string'?r:JSON.stringify(r,null,2);
    }catch(e){this.rawCfgContent='// '+e.message}
  },
  async pushAll(){
    if(!confirm(this.lang==='zh'?'推送到所有节点？':'Push config to ALL nodes?'))return;
    try{
      const r=await this.api('/api/batch/push-all',{method:'POST'});
      const pushed=r.filter(x=>x.status==='pushed').length;
      const failed=r.filter(x=>x.status!=='pushed');
      if(failed.length){
        this.toast((this.lang==='zh'?`已推送 ${pushed} 个，失败：`:`Pushed ${pushed}; failed: `)+failed.map(x=>x.node||('#'+x.node_id)).join(', '),'error');
      }else{
        this.toast(this.lang==='zh'?`已推送 ${pushed} 个节点`:`Pushed ${pushed} node(s)`);
      }
    }
    catch(e){this.toast(e.message,'error')}
  }
}}
</script>
</body>
